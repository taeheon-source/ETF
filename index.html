<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hana Bond ETF Monitoring</title>
    <meta
      name="description"
      content="국내 종합채권 ETF NAV 기준 수익률을 비교하는 모니터링 대시보드"
    />
    <meta name="theme-color" content="#0a0a0a" />
    <meta property="og:title" content="Hana Bond ETF Monitoring" />
    <meta
      property="og:description"
      content="국내 종합채권 ETF NAV 기준 수익률을 비교하는 모니터링 대시보드"
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/social-card.svg" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Hana Bond ETF Monitoring" />
    <meta
      name="twitter:description"
      content="국내 종합채권 ETF NAV 기준 수익률을 비교하는 모니터링 대시보드"
    />
    <meta name="twitter:image" content="/social-card.svg" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <h1>Hana Bond ETF Monitoring</h1>
      </header>
      <p class="hero-footnote">*Source: KRX API</p>

      <main class="dashboard">
        <section class="panel controls-panel">
          <div class="panel-heading">
            <p class="panel-kicker">Controls</p>
          </div>

          <div class="controls-grid controls-grid-compact">
            <label class="control">
              <span>기준일</span>
              <select id="baseDateSelect"></select>
            </label>
            <label class="control">
              <span>비교일</span>
              <select id="compareDateSelect"></select>
            </label>
            <div class="control control-action">
              <span>&nbsp;</span>
              <button id="refreshButton" class="action-button" type="button">KRX 데이터 새로고침</button>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Overview</p>
              <h2>ETF 수익률 현황</h2>
            </div>
            <div class="table-toolbar">
              <label class="inline-control">
                <span>정렬 기준</span>
                <select id="sortMetricSelect">
                  <option value="YTD" selected>YTD</option>
                  <option value="1D">1D</option>
                  <option value="7D">7D</option>
                  <option value="MTD">MTD</option>
                  <option value="QTD">QTD</option>
                  <option value="CUSTOM">사용자 지정</option>
                </select>
              </label>
            </div>
          </div>
          <div class="table-shell">
            <div class="table-wrap">
              <table class="returns-table">
                <thead>
                  <tr>
                    <th>ETF명</th>
                    <th>1D</th>
                    <th>7D</th>
                    <th>MTD</th>
                    <th>QTD</th>
                    <th>YTD</th>
                    <th id="compareHeader">비교일 대비</th>
                  </tr>
                </thead>
                <tbody id="returnsTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>

        <section class="split">
          <section class="panel chart-panel">
            <div class="panel-heading">
              <div>
                <p class="panel-kicker">Selected ETF</p>
                <h2 id="chartTitle">선택 ETF NAV 추이</h2>
              </div>
              <p class="panel-meta" id="chartMeta"></p>
            </div>
            <div class="detail-metrics" id="detailMetrics"></div>
            <div class="chart-shell">
              <div class="chart-wrap">
                <svg id="trendChart" viewBox="0 0 640 280" role="img" aria-label="ETF NAV 추이 차트"></svg>
              </div>
            </div>
          </section>

          <section class="panel ranking-panel">
            <div class="panel-heading">
              <div>
                <p class="panel-kicker">Ranking</p>
                <h2>ETF 수익률 랭킹</h2>
              </div>
              <label class="inline-control">
                <span>기준</span>
                <select id="rankingMetricSelect">
                  <option value="1D">1D</option>
                  <option value="7D">7D</option>
                  <option value="MTD">MTD</option>
                  <option value="QTD">QTD</option>
                  <option value="YTD" selected>YTD</option>
                  <option value="CUSTOM">사용자 지정</option>
                </select>
              </label>
            </div>
            <div class="ranking-list" id="rankingList"></div>
          </section>
        </section>

        <section class="panel">
          <div class="panel-heading">
            <div>
              <p class="panel-kicker">Raw Data</p>
              <h2>ETF NAV 원본 데이터</h2>
            </div>
            <button id="exportCsvButton" class="action-button action-button-secondary" type="button">
              CSV 다운로드
            </button>
          </div>
          <div class="table-shell">
            <div class="table-wrap">
              <table class="nav-table">
                <thead id="navTableHead"></thead>
                <tbody id="navTableBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
